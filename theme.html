<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Ticker</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker {
      display: inline-block;
      white-space: nowrap;
      color: white;
      font-size: 34px;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.9);
      padding-left: 100%;
      will-change: transform;
      animation: marquee 14s linear infinite;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-100%);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="ticker-track">
      <div id="ticker" class="ticker hidden"></div>
    </div>
  </div>

  <script>
    const ticker = document.getElementById("ticker");
    const eventSource = new EventSource('/api/stream');

    eventSource.addEventListener('track', (event) => {
      const track = JSON.parse(event.data);

      if (!track || !track.title || track.playing === false) {
        ticker.classList.add('hidden');
        return;
      }

      ticker.textContent = track.title;
      ticker.classList.remove('hidden');

      ticker.style.animation = 'none';
      void ticker.offsetWidth;
      ticker.style.animation = 'marquee 14s linear infinite';
    });
  </script>
</body>
</html>
