<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VTC Now Playing</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      padding: 0 12px;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      will-change: transform, opacity;
      animation: marquee 80s linear infinite;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .ticker-track.fade-out {
      opacity: 0;
    }

    .ticker-track.fade-in {
      opacity: 1;
    }

    .ticker-item {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      color: #d7d7d7;
      font-size: 22px;
      font-weight: 700;
      margin-right: 320px;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
      letter-spacing: 0.2px;
    }

    .dot {
      width: 25px;
      height: 25px;
      margin-right: 10px;
      flex-shrink: 0;
      display: block;
    }

    .title {
      color: #ffffff;
      font-weight: 800;
    }

    .meta {
      color: #bdbdbd;
      font-weight: 600;
      margin-left: 14px;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="tickerTrack" class="ticker-track hidden"></div>
  </div>

  <script>
    const tickerTrack = document.getElementById("tickerTrack");
    const eventSource = new EventSource("/api/stream");
    let currentTrackKey = "";

    function buildText(track) {
      const title = track.title || "";
      const artist = track.artist ? `Artist: ${track.artist}` : "";
      return { title, artist };
    }

    function createPlayIcon() {
      const img = document.createElement("img");
      img.className = "dot";
      img.alt = "play";
      img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#E7D78A" stroke-width="2.5"/>
          <path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#E7D78A"/>
        </svg>
      `);
      return img;
    }

    function createItem(track) {
      const { title, artist } = buildText(track);

      const item = document.createElement("div");
      item.className = "ticker-item";

      const dot = createPlayIcon();

      const titleSpan = document.createElement("span");
      titleSpan.className = "title";
      titleSpan.textContent = title;

      item.appendChild(dot);
      item.appendChild(titleSpan);

      if (artist) {
        const metaSpan = document.createElement("span");
        metaSpan.className = "meta";
        metaSpan.textContent = artist;
        item.appendChild(metaSpan);
      }

      return item;
    }

    function fillTicker(track) {
      tickerTrack.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        tickerTrack.appendChild(createItem(track));
      }

      for (let i = 0; i < 5; i++) {
        tickerTrack.appendChild(createItem(track));
      }

      tickerTrack.style.animation = "none";
      void tickerTrack.offsetWidth;
      tickerTrack.style.animation = "marquee 80s linear infinite";
    }

    function showTrack(track) {
      const newTrackKey = `${track.title || ""}__${track.artist || ""}`;

      if (newTrackKey === currentTrackKey) {
        return;
      }

      currentTrackKey = newTrackKey;
      tickerTrack.classList.remove("hidden");
      tickerTrack.classList.remove("fade-in");
      tickerTrack.classList.add("fade-out");

      setTimeout(() => {
        fillTicker(track);
        tickerTrack.classList.remove("fade-out");
        tickerTrack.classList.add("fade-in");
      }, 800);
    }

    function hideTrack() {
      tickerTrack.classList.remove("fade-in");
      tickerTrack.classList.add("fade-out");

      setTimeout(() => {
        tickerTrack.classList.add("hidden");
        tickerTrack.classList.remove("fade-out");
        tickerTrack.innerHTML = "";
        currentTrackKey = "";
      }, 800);
    }

    eventSource.addEventListener("track", (event) => {
      const track = JSON.parse(event.data);

      if (!track || !track.title || track.playing === false) {
        hideTrack();
        return;
      }

      showTrack(track);
    });
  </script>
</body>
</html>
